name: Publish to crates.io

on:
  push:
    tags:
      - "rust-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish --dry-run only"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  publish:
    name: Publish skia-canvas to crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libfreetype6-dev \
            libssl-dev \
            pkg-config

      - name: Verify Cargo.toml metadata
        run: cargo metadata --no-deps --format-version 1 >/dev/null

      - name: Package (no verification, surfaces include-list issues)
        run: cargo package --no-verify --list

      - name: Build with feature subset that crates.io will use
        run: cargo build --no-default-features --features "vulkan,window,freetype"

      - name: Run native API contract test
        run: cargo test --no-default-features --features "vulkan,window,freetype" --test native_api_contract

      - name: Publish (dry-run on workflow_dispatch unless dry_run=false, real on tag)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" != "false" ]; then
            cargo publish --no-default-features --features "vulkan,window,freetype" --dry-run
          else
            cargo publish --no-default-features --features "vulkan,window,freetype"
          fi
